# docker-compose.single-platoon.yml — DinD 구조
#
# Host
#   └── vehicle-truck1 (Docker)  ← 차량 컨테이너 (Docker 소켓 공유)
#         └── openclaw-truck1 (Docker)  ← entrypoint.sh가 실행
#   └── vehicle-truck3 (Docker)  ← 분기 시 replicator가 생성
#         └── openclaw-truck3 (Docker)
#   (vehicle-truck2 없음 — truck_2는 순수 CACC 팔로워)

services:

  # ── 브리지 서버 ─────────────────────────────────────────────────────────
  sp-bridge-server:
    image: python:3.10-slim
    container_name: sp-bridge-server
    volumes:
      - ./bridge:/bridge:ro
      - ./platoon_destinations.json:/platoon_destinations.json:ro
    environment:
      PLATOON_DESTINATIONS_PATH: /platoon_destinations.json
    command: python3 /bridge/platoon_bridge_server.py
    network_mode: host
    restart: unless-stopped

  # ── vehicle-truck1 (DinD) ─────────────────────────────────────────────
  # 내부에서 openclaw-truck1을 자동 실행
  vehicle-truck1:
    build:
      context: .
      dockerfile: vehicle/Dockerfile
    container_name: vehicle-truck1
    environment:
      TRUCK_ID: truck1
      OPENCLAW_DATA_DIR: /data/openclaw
      DISCORD_BOT_TOKEN: ${TRUCK1_DISCORD_BOT_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${TRUCK1_OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      # Docker 소켓 공유 — vehicle 안에서 docker 명령 실행 가능
      - /var/run/docker.sock:/var/run/docker.sock
      # truck_1 OpenClaw 데이터 디렉터리
      - ${TRUCK1_CONFIG_DIR:-./.openclaw-truck1}:/data/openclaw
      # 전송 버퍼 (V2V 에뮬레이션)
      - ./.transfer:/transfer
      # 브리지 스크립트 + 복제기
      - ./bridge:/project/scripts:ro
      - ./openclaw_migration:/project/openclaw_migration:ro
    network_mode: host
    restart: unless-stopped
    depends_on:
      - sp-bridge-server

  # ── vehicle-truck3 ────────────────────────────────────────────────────
  # 분기 시 replicator.py가 동적으로 생성 (여기서는 미정의)
  # 생성 방법:
  #   python3 openclaw_migration/test_migration.py
  # 또는 시나리오 실행 중 자동 생성

